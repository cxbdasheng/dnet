<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>系统设置</title>
    <link rel="stylesheet" href="/static/css/layui.css">
    <link rel="stylesheet" href="/static/css/common.css">
    <link rel="shortcut icon" href="/favicon.ico" type="image/x-icon">
    <script src="/static/layui.js"></script>
</head>
<style>
    .layui-fluid {
        padding: 15px;
        background: #fff;
    }
</style>
<body>
<div class="layui-fluid">
    <div class="layui-row">
        <form class="layui-form">
            <div class="layui-form-item">
                <label for="not_allow_wan_access" class="layui-form-label">禁止公网访问</label>
                <div class="layui-input-inline">
                    <input type="checkbox" id="not_allow_wan_access" name="not_allow_wan_access" lay-skin="switch" {{if .NotAllowWanAccess}}checked{{end}}
                           lay-text="开启|关闭">
                    <tip>启用后禁止从公网访问此程序</tip>
                </div>
            </div>
            <div class="layui-form-item">
                <label for="username" class="layui-form-label">用户名</label>
                <div class="layui-input-block">
                    <input type="text" id="username" name="username" autocomplete="on" value="{{.Username}}" lay-verify="required" class="layui-input">
                </div>
            </div>
            <div class="layui-form-item">
                <label for="password" class="layui-form-label">密 码</label>
                <div class="layui-input-block">
                    <input type="password" id="password" name="password" class="layui-input" lay-affix="eye">
                </div>
            </div>
            <!--同步频率-->
            <fieldset class="layui-elem-field layui-field-title">
                <legend>同步频率设置</legend>
            </fieldset>
            <div class="layui-form-item">
                <label for="every" class="layui-form-label">同步间隔</label>
                <div class="layui-input-inline">
                    <input type="text" id="every" name="every" value="{{.Every}}" lay-affix="number" step="1" max="86400" min="10" class="layui-input">
                    <tip>每 N 秒同步一次</tip>
                </div>
                <div class="layui-form-mid layui-word-aux">秒</div>
            </div>
            <div class="layui-form-item">
                <label for="dcdn_cache_times" class="layui-form-label">DCDN 强制同步</label>
                <div class="layui-input-inline">
                    <input type="text" id="dcdn_cache_times" name="dcdn_cache_times" value="{{.DCDNCacheTimes}}" lay-affix="number" step="1" max="1000" min="1" class="layui-input">
                </div>
                <div class="layui-form-mid layui-word-aux">次</div>
            </div>
            <div class="layui-form-item">
                <label for="ddns_cache_times" class="layui-form-label">DDNS 强制同步</label>
                <div class="layui-input-inline">
                    <input type="text" id="ddns_cache_times" name="ddns_cache_times" value="{{.DDNSCacheTimes}}" lay-affix="number" step="1" max="1000" min="1" class="layui-input">
                </div>
                <div class="layui-form-mid layui-word-aux">次</div>
            </div>
        </form>
    </div>
</div>
</body>
</html>
